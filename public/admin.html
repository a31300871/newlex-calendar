<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Admin Dashboard · Near and Far Events</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='100' y1='0' y2='100' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%236366F1'/%3E%3Cstop offset='.5' stop-color='%23EC4899'/%3E%3Cstop offset='1' stop-color='%23F59E0B'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath fill='url(%23g)' d='M50 8 60 35 90 38 67 56 75 87 50 70 25 87 33 56 10 38 40 35z'/%3E%3C/svg%3E">
<style>
:root {
  --bg: #FAFAF9; --surface: #FFFFFF; --surface2: #F5F5F4;
  --text: #1C1917; --text2: #57534E; --text3: #78716C;
  --border: #E7E5E4; --border-md: #D6D3D1;
  --amber: #F59E0B; --amber-lt: #FEF3C7; --amber-dk: #92400E;
  --green: #10B981; --green-lt: #D1FAE5; --green-dk: #065F46;
  --red: #DC2626; --red-lt: #FEE2E2; --red-dk: #991B1B;
  --indigo: #6366F1; --pink: #EC4899;
  --gradient: linear-gradient(135deg, #6366F1, #EC4899, #F59E0B);
  --font-head: 'Fraunces', Georgia, serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --r: 10px;
}
[data-theme="dark"] {
  --bg: #1C1917; --surface: #292524; --surface2: #1C1917;
  --text: #FAFAF9; --text2: #D6D3D1; --text3: #A8A29E;
  --border: #44403C; --border-md: #57534E;
  --amber-lt: rgba(245,158,11,.15); --green-lt: rgba(16,185,129,.15); --red-lt: rgba(220,38,38,.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.5; }
a { color: var(--indigo); text-decoration: none; font-weight: 600; }
a:hover { text-decoration: underline; }

/* Header */
.site-header { background: var(--surface); border-bottom: 1.5px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); }
.hdr-wrap { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.logo { font-family: var(--font-head); font-size: 20px; font-weight: 800; letter-spacing: -.01em; }
.logo .grad { background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.hdr-right { display: flex; align-items: center; gap: 8px; }
.hdr-nav-link { font-size: 13px; color: var(--text2); padding: 6px 12px; border-radius: 100px; }
.hdr-nav-link:hover { background: var(--surface2); color: var(--text); text-decoration: none; }
.theme-toggle { background: var(--surface2); border: 1.5px solid var(--border-md); color: var(--text); padding: 6px 12px; border-radius: 100px; cursor: pointer; font-size: 12px; font-weight: 600; }

/* Page wrap */
.wrap { max-width: 1280px; margin: 0 auto; padding: 28px 20px 80px; }
h1 { font-family: var(--font-head); font-size: 32px; font-weight: 800; line-height: 1.15; letter-spacing: -.01em; margin-bottom: 4px; }
h1 .grad { background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.sub { color: var(--text2); font-size: 14px; margin-bottom: 28px; }

/* Stats strip */
.stats-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 32px; }
.stat { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 14px 16px; }
.stat-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.stat-value { font-family: var(--font-head); font-size: 26px; font-weight: 800; line-height: 1; color: var(--text); }
.stat-value.urgent { color: var(--red); }

/* Category sections */
.section { margin-bottom: 32px; }
/* Pre-launch checklist banner */
.launch-banner { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 18px 22px; margin-bottom: 28px; box-shadow: 0 4px 16px rgba(0,0,0,.04); position: relative; overflow: hidden; }
.launch-banner.ready { border-left: 4px solid var(--green); }
.launch-banner.warning { border-left: 4px solid var(--amber); }
.launch-banner.critical { border-left: 4px solid var(--red); }
.launch-banner-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; cursor: pointer; }
.launch-banner-title { font-family: var(--font-head); font-size: 19px; font-weight: 800; color: var(--text); }
.launch-banner-summary { font-size: 13px; color: var(--text2); margin-top: 2px; }
.launch-banner-toggle { background: var(--surface2); border: 1.5px solid var(--border-md); color: var(--text); padding: 6px 14px; border-radius: 100px; font-size: 12px; font-weight: 700; cursor: pointer; }
.launch-items { display: none; margin-top: 16px; padding-top: 16px; border-top: 1.5px solid var(--border); }
.launch-items.open { display: block; }
.launch-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.launch-item:last-child { border-bottom: none; }
.launch-item-icon { font-size: 16px; flex-shrink: 0; line-height: 1.3; }
.launch-item-body { flex: 1; min-width: 0; }
.launch-item-label { font-weight: 700; color: var(--text); }
.launch-item-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.launch-item-help { font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.5; }
.launch-item.ok .launch-item-label { color: var(--green-dk); text-decoration: line-through; opacity: .65; }
.launch-tier-divider { font-size: 11px; font-weight: 800; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin: 16px 0 6px; padding-top: 10px; border-top: 1px dashed var(--border); }
.launch-tier-divider:first-child { border-top: none; padding-top: 0; margin-top: 0; }
.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.section-head h2 { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: var(--text); }
.section-head .cat-tag { background: var(--gradient); color: #fff; font-size: 10px; font-weight: 800; letter-spacing: .08em; padding: 3px 10px; border-radius: 100px; text-transform: uppercase; }
.section-head .count { color: var(--text3); font-size: 13px; margin-left: auto; }

/* Tile grid */
.tile-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
.tile { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 16px 18px; transition: all .15s; position: relative; overflow: hidden; }
.tile.priority-1 { border-left: 4px solid var(--red); }
.tile.priority-2 { border-left: 4px solid var(--amber); }
.tile.priority-3 { border-left: 4px solid var(--indigo); }
.tile.priority-4, .tile.priority-5 { border-left: 4px solid var(--border-md); }
.tile.completed { opacity: .5; }
.tile.completed .tile-title { text-decoration: line-through; }
.tile-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.tile-title { font-family: var(--font-body); font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.35; flex: 1; }
.tile-count { font-family: var(--font-head); font-size: 28px; font-weight: 800; line-height: 1; color: var(--text); }
.tile-count.zero { color: var(--text3); }
.tile-count.alert { color: var(--red); }
.tile-count.warn { color: var(--amber-dk); }
.tile-count.good { color: var(--green-dk); }
.tile-meta { font-size: 11px; color: var(--text3); margin-top: 4px; }
.tile-actions { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
.tile-btn { background: var(--surface2); border: 1.5px solid var(--border-md); color: var(--text); font-size: 12px; font-weight: 700; padding: 7px 12px; border-radius: 100px; cursor: pointer; font-family: var(--font-body); transition: all .15s; }
.tile-btn:hover { background: var(--amber-lt); border-color: var(--amber); color: var(--amber-dk); }
.tile-btn.primary { background: var(--gradient); color: #fff; border: none; }
.tile-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,.25); }
.tile-btn.done-toggle { font-size: 11px; padding: 4px 10px; }
.tile-btn.done-toggle.completed { background: var(--green-lt); border-color: var(--green); color: var(--green-dk); }

/* Modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.on { display: flex; }
.modal { background: var(--surface); border-radius: 14px; max-width: 560px; width: 100%; padding: 26px 30px; box-shadow: 0 20px 60px rgba(0,0,0,.30); max-height: 90vh; overflow-y: auto; }
.modal-title { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 6px; line-height: 1.2; }
.modal-body { font-size: 14px; color: var(--text2); line-height: 1.65; margin-bottom: 16px; white-space: pre-wrap; }
.modal-body a { color: var(--indigo); word-break: break-all; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.btn-amber { background: var(--gradient); color: #fff; border: none; padding: 10px 18px; border-radius: 100px; font-weight: 700; cursor: pointer; font-size: 13px; font-family: var(--font-body); }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border-md); padding: 10px 18px; border-radius: 100px; font-weight: 700; cursor: pointer; font-size: 13px; font-family: var(--font-body); }
textarea.notes { width: 100%; padding: 10px 12px; font-size: 13px; font-family: var(--font-body); border: 1.5px solid var(--border-md); border-radius: var(--r); background: var(--surface); color: var(--text); resize: vertical; }

.loading { text-align: center; padding: 40px; color: var(--text3); }
.access-denied { text-align: center; padding: 60px 20px; }
.access-denied h2 { font-family: var(--font-head); font-size: 28px; margin-bottom: 12px; }
.access-denied a { display: inline-block; margin-top: 16px; }

@media (max-width: 600px) {
  .wrap { padding: 20px 14px 60px; }
  h1 { font-size: 26px; }
  .stats-strip { grid-template-columns: repeat(2, 1fr); }
  .tile-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="hdr-wrap">
    <a href="/" class="logo">Near and Far <span class="grad">Events</span> · Admin</a>
    <nav class="hdr-right">
      <a href="/" class="hdr-nav-link">Calendar</a>
      <a href="/directory" class="hdr-nav-link">Directory</a>
      <a href="/advertise" class="hdr-nav-link">Advertise</a>
      <a href="/help" class="hdr-nav-link">Help</a>
      <button class="theme-toggle" onclick="toggleTheme()"><span id="themeIcon">🌙</span><span id="themeLabel" style="margin-left:4px">Dark</span></button>
    </nav>
  </div>
</header>

<div class="wrap">
  <div id="loadingState" class="loading">
    <div style="font-size:14px">Loading dashboard…</div>
  </div>
  <div id="accessDenied" class="access-denied" style="display:none">
    <h2>🔒 Admin Access Required</h2>
    <p>Sign in as an admin to view this dashboard.</p>
    <p id="errDetail" style="font-size:12px;color:var(--text3);margin-top:12px;font-family:Menlo,monospace"></p>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap">
      <a href="/" class="btn-amber">Go to Calendar → Sign In</a>
      <button class="btn-ghost" onclick="location.reload()">🔄 Reload</button>
    </div>
  </div>
  <div id="dashboard" style="display:none">
    <h1>🎯 Admin <span class="grad">Dashboard</span></h1>
    <p class="sub">Operations status, business checklist, and to-dos — all in one place.</p>

    <div id="launchChecklist"></div>
    <div id="statsStrip" class="stats-strip"></div>
    <div id="sectionsContainer"></div>
  </div>
</div>



<!-- ── Manage Moderators ── -->
<div id="manageModsModal" class="modal-bg" onclick="if(event.target===this)closeAdminModal('manageModsModal')">
  <div class="modal" style="max-width:680px"><div id="manageModsContent"></div></div>
</div>

<!-- ── Flagged Items ── -->
<div id="flaggedItemsModal" class="modal-bg" onclick="if(event.target===this)closeAdminModal('flaggedItemsModal')">
  <div class="modal" style="max-width:680px"><div id="flaggedItemsContent"></div></div>
</div>

<!-- ── Approvals Panel ── -->
<div id="approvalsModal" class="modal-bg" onclick="if(event.target===this)closeAdminModal('approvalsModal')">
  <div class="modal" style="max-width:720px"><div id="approvalsContent"></div></div>
</div>

<!-- ── Removed Items Log ── -->
<div id="removedLogModal" class="modal-bg" onclick="if(event.target===this)closeAdminModal('removedLogModal')">
  <div class="modal" style="max-width:820px"><div id="removedLogContent"></div></div>
</div>

<!-- ── Manage Business Ads ── -->
<div id="manageAdsModal" class="modal-bg" onclick="if(event.target===this)closeAdminModal('manageAdsModal')">
  <div class="modal" style="max-width:780px"><div id="manageAdsContent"></div></div>
</div>

<!-- ── Add Business Ad (Manual) ── -->
<div id="manualAdModal" class="modal-bg" onclick="if(event.target===this)closeAdminModal('manualAdModal')">
  <div class="modal" style="max-width:540px"><div id="manualAdContent"></div></div>
</div>

<!-- ── Bulk Remove by User ── -->
<div id="bulkRemoveModal" class="modal-bg" onclick="if(event.target===this)closeAdminModal('bulkRemoveModal')">
  <div class="modal" style="max-width:680px"><div id="bulkRemoveContent"></div></div>
</div>

<!-- ── Make Listing State-Wide ── -->
<div id="statewideListingModal" class="modal-bg" onclick="if(event.target===this)closeAdminModal('statewideListingModal')">
  <div class="modal" style="max-width:580px"><div id="statewideListingContent"></div></div>
</div>

<!-- ── Make Event State-Wide ── -->
<div id="statewideEventModal" class="modal-bg" onclick="if(event.target===this)closeAdminModal('statewideEventModal')">
  <div class="modal" style="max-width:580px"><div id="statewideEventContent"></div></div>
</div>

<!-- ── Generic message popup (toast-like) ── -->
<div id="adminToast" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);padding:11px 22px;border-radius:100px;font-size:13px;font-weight:600;z-index:5000;display:none;box-shadow:0 8px 24px rgba(0,0,0,.25)"></div>


<!-- Instructions Modal -->
<div id="instructionsModal" class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modTitle"></div>
    <div class="modal-body" id="modBody"></div>
    <div>
      <label style="font-size:12px;font-weight:700;color:var(--text2);display:block;margin-bottom:6px">📝 Your notes</label>
      <textarea class="notes" id="modNotes" rows="3" placeholder="Track progress, dates, contact info, etc."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn-amber" id="modSaveBtn" onclick="saveNotes()">Save Notes</button>
      <button class="btn-amber" id="modToggleBtn" onclick="toggleFromModal()" style="margin-left:auto"></button>
    </div>
  </div>
</div>

<script>
// Theme
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('nf_theme', next); } catch(_) {}
  document.getElementById('themeIcon').textContent = next === 'dark' ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = next === 'dark' ? 'Light' : 'Dark';
}
(function() {
  try {
    const saved = localStorage.getItem('nf_theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('themeIcon').textContent = saved === 'dark' ? '☀️' : '🌙';
    document.getElementById('themeLabel').textContent = saved === 'dark' ? 'Light' : 'Dark';
  } catch(_) {}
})();

// API + auth
const TOKEN = localStorage.getItem('nlcc_token');
async function api(path, opts) {
  const res = await fetch(path, { ...opts, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN, ...(opts?.headers || {}) }});
  if (!res.ok) throw new Error((await res.json().catch(()=>({error:'Network error'}))).error || ('HTTP ' + res.status));
  return res.json();
}
function esc(s) { return String(s||'').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

// Dynamic operational tiles (live counts from /api/admin/dashboard)
const SITE_OPS_TILES = [
  { key:'pendingEvents',     title:'Pending Event Approvals',   action:{label:'Review',  fn:'openApprovalsPanel()'}, alertWhen: c=>c>0, meta:'Events awaiting your OK' },
  { key:'pendingInsiders',   title:'Pending Local Insider Requests', action:{label:'Review', fn:'openApprovalsPanel()'}, alertWhen: c=>c>0, meta:'User upgrade requests' },
  { key:'pendingListings',   title:'Pending Business Listings', action:{label:'Review',  fn:'openApprovalsPanel()'}, alertWhen: c=>c>0, meta:'Business directory submissions' },
  { key:'recentRemovals',    title:'Removed Items (last 30d)',  action:{label:'View Log', fn:'openRemovedLog()'}, alertWhen: ()=>false, warnWhen: c=>c>0, meta:'Auto-purges at 24 months' },
  { key:'flaggedCount',      title:'🚩 Flagged by Moderators',   action:{label:'Review',  fn:'openFlaggedItems()'}, alertWhen: c=>c>0,  meta:'Items mods escalated to you' },
];
const REVENUE_TILES = [
  { key:'activeBasic',       title:'Active Sponsor Bar Ads',   action:{label:'Manage', fn:'openManageAdsModal()'}, goodWhen: c=>c>0, meta:'$25/mo · Bottom banner placements' },
  { key:'activeFeatured',    title:'Active Featured Directory',action:{label:'Manage', fn:'openManageAdsModal()'}, goodWhen: c=>c>0, meta:'$30/mo · Directory top spots' },
  { key:'activePremium',     title:'Active Premium Popup Ads', action:{label:'Manage', fn:'openManageAdsModal()'}, goodWhen: c=>c>0, meta:'$50/mo · Event popup ads (max 5)' },
  { key:'activeSponsorships',title:'Active Calendar Sponsors', action:null, goodWhen: c=>c>0, meta:'2-week thank-you placements' },
];
// Quick action tiles for admin tools that don't have a "count" — always-visible action buttons
const QUICK_ACTION_TILES = [
  { title:'📢 Add Business Ad (Manual)',  desc:'Manually add a paid advertiser', fn:'openManualAdvertiser()' },
  { title:'👤 Bulk Remove by User',       desc:'Find a user, remove all their content', fn:'openBulkRemove()' },
  { title:'🌎 Make Listing State-Wide',   desc:'Promote a listing across an entire state', fn:'openStatewideListing()' },
  { title:'📅 Make Event State-Wide',     desc:'Promote an event across an entire state', fn:'openStatewideEvent()' },
  { title:'👥 Manage Moderators',          desc:'Promote trusted users to moderator role', fn:'openManageMods()' },
];
// Add flaggedCount to counts after data loads
function _augmentCounts(data) {
  return Promise.all([
    fetch('/api/admin/flagged-items', { headers: { 'Authorization': 'Bearer ' + TOKEN }}).then(r=>r.json()).catch(()=>[]),
  ]).then(([flagged]) => {
    data.counts.flaggedCount = Array.isArray(flagged) ? flagged.length : 0;
    return data;
  });
}
const STATS_TILES = [
  { key:'totalEvents',       label:'Upcoming Events' },
  { key:'totalListings',     label:'Business Listings' },
  { key:'totalUsers',        label:'Registered Users' },
  { key:'pendingEvents',     label:'Pending Approvals', urgent: c=>c>0 },
];
const CATEGORY_LABELS = {
  business:   { label:'Business & Legal',     tag:'BUSINESS',    emoji:'⚖️' },
  technical:  { label:'Technical Setup',      tag:'TECHNICAL',   emoji:'⚙️' },
  marketing:  { label:'Marketing & Outreach', tag:'MARKETING',   emoji:'📢' },
  expansion:  { label:'Expansion',            tag:'GROWTH',      emoji:'🌎' },
};

let _dashboardData = null;
let _currentTask = null;

async function loadDashboard() {
  try {
    let data = await api('/api/admin/dashboard');
    data = await _augmentCounts(data);
    _dashboardData = data;
    loadLaunchChecklist();  // fire-and-forget
    renderDashboard();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('accessDenied').style.display = 'block';
    // Show the actual error so we can diagnose 403 vs 500 vs network
    const detailEl = document.getElementById('errDetail');
    if (detailEl) detailEl.textContent = 'Details: ' + (e?.message || 'Unknown error');
    console.error('Admin dashboard load error:', e);
  }
}

function renderDashboard() {
  const { counts, tasks } = _dashboardData;

  // Top stats strip
  document.getElementById('statsStrip').innerHTML = STATS_TILES.map(s => `
    <div class="stat">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value ${s.urgent && s.urgent(counts[s.key]) ? 'urgent' : ''}">${counts[s.key].toLocaleString()}</div>
    </div>
  `).join('');

  // Site Operations section
  const siteOpsHtml = `
    <div class="section">
      <div class="section-head">
        <span style="font-size:22px">🛡️</span>
        <h2>Site Operations</h2>
        <span class="cat-tag">MODERATION</span>
        <span class="count">Live data</span>
      </div>
      <div class="tile-grid">
        ${SITE_OPS_TILES.map(t => renderLiveTile(t, counts[t.key])).join('')}
      </div>
    </div>`;

  // Revenue section
  const revenueHtml = `
    <div class="section">
      <div class="section-head">
        <span style="font-size:22px">💰</span>
        <h2>Active Advertising</h2>
        <span class="cat-tag">REVENUE</span>
        <span class="count">Live data</span>
      </div>
      <div class="tile-grid">
        ${REVENUE_TILES.map(t => renderLiveTile(t, counts[t.key])).join('')}
      </div>
    </div>`;

  // Quick Actions section — action-only tiles for admin tools
  const quickActionsHtml = `
    <div class="section">
      <div class="section-head">
        <span style="font-size:22px">🛠️</span>
        <h2>Quick Actions</h2>
        <span class="cat-tag">TOOLS</span>
        <span class="count">All available admin tools</span>
      </div>
      <div class="tile-grid">
        ${QUICK_ACTION_TILES.map(t => `
          <div class="tile priority-4">
            <div class="tile-head">
              <div class="tile-title">${t.title}</div>
            </div>
            <div class="tile-meta">${t.desc}</div>
            <div class="tile-actions"><button onclick="${t.fn}" class="tile-btn primary">Open →</button></div>
          </div>
        `).join('')}
      </div>
    </div>`;

  // Group checklist tasks by category
  const byCategory = {};
  tasks.forEach(t => { (byCategory[t.category] = byCategory[t.category] || []).push(t); });
  const checklistHtml = Object.entries(CATEGORY_LABELS).map(([cat, info]) => {
    const items = byCategory[cat] || [];
    if (!items.length) return '';
    const open = items.filter(t => !t.completed).length;
    return `
      <div class="section">
        <div class="section-head">
          <span style="font-size:22px">${info.emoji}</span>
          <h2>${info.label}</h2>
          <span class="cat-tag">${info.tag}</span>
          <span class="count">${open} of ${items.length} open</span>
        </div>
        <div class="tile-grid">
          ${items.map(t => renderTaskTile(t)).join('')}
        </div>
      </div>`;
  }).join('');

  document.getElementById('sectionsContainer').innerHTML = siteOpsHtml + revenueHtml + quickActionsHtml + checklistHtml;
}

function renderLiveTile(t, count) {
  let countClass = 'zero';
  if (t.alertWhen && t.alertWhen(count)) countClass = 'alert';
  else if (t.warnWhen && t.warnWhen(count)) countClass = 'warn';
  else if (t.goodWhen && t.goodWhen(count)) countClass = 'good';
  return `
    <div class="tile">
      <div class="tile-head">
        <div class="tile-title">${t.title}</div>
        <div class="tile-count ${countClass}">${count.toLocaleString()}</div>
      </div>
      <div class="tile-meta">${t.meta || ''}</div>
      ${t.action ? `<div class="tile-actions"><button onclick="${t.action.fn}" class="tile-btn primary">${t.action.label} →</button></div>` : ''}
    </div>`;
}

function renderTaskTile(task) {
  const priorityClass = 'priority-' + (task.priority || 5);
  const completedClass = task.completed ? ' completed' : '';
  return `
    <div class="tile ${priorityClass}${completedClass}">
      <div class="tile-head">
        <div class="tile-title">${esc(task.title)}</div>
        <div style="font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.05em">P${task.priority}</div>
      </div>
      ${task.notes ? `<div class="tile-meta">📝 ${esc(task.notes.slice(0,60))}${task.notes.length>60?'…':''}</div>` : ''}
      <div class="tile-actions">
        <button class="tile-btn" onclick='openInstructions(${JSON.stringify(task).replace(/'/g,"&#39;")})'>📖 Instructions</button>
        <button class="tile-btn done-toggle ${task.completed ? 'completed' : ''}" onclick="toggleTask('${task.task_key}')">${task.completed ? '✓ Done' : 'Mark Done'}</button>
      </div>
    </div>`;
}

function openInstructions(task) {
  _currentTask = task;
  document.getElementById('modTitle').textContent = task.title;
  // Format instructions with clickable URLs
  const formatted = (task.instructions || 'No instructions saved.').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  document.getElementById('modBody').innerHTML = formatted;
  document.getElementById('modNotes').value = task.notes || '';
  const toggleBtn = document.getElementById('modToggleBtn');
  toggleBtn.textContent = task.completed ? '↩️ Mark Incomplete' : '✓ Mark Done';
  document.getElementById('instructionsModal').classList.add('on');
}

function closeModal() {
  document.getElementById('instructionsModal').classList.remove('on');
  _currentTask = null;
}

async function saveNotes() {
  if (!_currentTask) return;
  const notes = document.getElementById('modNotes').value;
  try {
    await api('/api/admin/tasks/' + _currentTask.task_key + '/notes', { method: 'PUT', body: JSON.stringify({ notes })});
    _currentTask.notes = notes;
    // Update tile inline
    await loadDashboard();
    closeModal();
  } catch(e) { alert('Could not save: ' + e.message); }
}

async function toggleTask(key) {
  try {
    await api('/api/admin/tasks/' + key + '/toggle', { method: 'POST' });
    await loadDashboard();
  } catch(e) { alert('Could not toggle: ' + e.message); }
}

async function toggleFromModal() {
  if (!_currentTask) return;
  await toggleTask(_currentTask.task_key);
  closeModal();
}

let _admEvSel = new Set();
function toggleAdmEvSel(id, cb) {
  if (cb.checked) _admEvSel.add(id); else _admEvSel.delete(id);
  const bar = document.getElementById('bulkEvBar');
  if (!bar) return;
  bar.style.display = _admEvSel.size ? 'flex' : 'none';
  document.getElementById('bulkEvCount').textContent = _admEvSel.size;
}
function selectAllPendingEvs(checked) {
  document.querySelectorAll('.adm-ev-cb').forEach(cb => {
    cb.checked = checked; const id = parseInt(cb.dataset.id, 10);
    if (checked) _admEvSel.add(id); else _admEvSel.delete(id);
  });
  const bar = document.getElementById('bulkEvBar');
  if (bar) { bar.style.display = _admEvSel.size ? 'flex' : 'none'; document.getElementById('bulkEvCount').textContent = _admEvSel.size; }
}
async function bulkModerateEvs(action) {
  const ids = [..._admEvSel];
  if (!ids.length) return;
  let reason = '';
  if (action === 'reject') { reason = prompt(`Reject ${ids.length} event(s)? Optional reason:`, 'Bulk-rejected'); if (reason === null) return; }
  else if (!confirm(`Approve ${ids.length} event(s)?`)) return;
  try {
    const r = await api('/api/admin/events/bulk-moderate', { method:'POST', body: JSON.stringify({ event_ids:ids, action, reason })});
    adminToast(`✓ ${r.count} event(s) ${action}d`);
    _admEvSel.clear();
    openApprovalsPanel();
    loadDashboard();
  } catch(e) { alert(e.message); }
}
async function approveItem(type, id) {
  try {
    if (type === 'event')   await api(`/api/admin/events/${id}/approve`, { method:'PUT' });
    if (type === 'listing') await api(`/api/admin/listings/${id}/approve`, { method:'PUT' });
    if (type === 'insider') await api(`/api/admin/insiders/${id}/approve`, { method:'POST' });
    adminToast('✓ Approved');
    openApprovalsPanel(); loadDashboard();
  } catch(e) { alert(e.message); }
}
async function rejectItem(type, id) {
  const reason = prompt('Reason for rejection (optional):', '');
  if (reason === null) return;
  try {
    if (type === 'event')   await api(`/api/admin/events/${id}`, { method:'DELETE', body: JSON.stringify({ reason })});
    if (type === 'listing') await api(`/api/admin/listings/${id}`, { method:'DELETE', body: JSON.stringify({ reason })});
    if (type === 'insider') await api(`/api/admin/insiders/${id}/reject`, { method:'POST', body: JSON.stringify({ reason })});
    adminToast('✓ Rejected');
    openApprovalsPanel(); loadDashboard();
  } catch(e) { alert(e.message); }
}

      ads.forEach(a => {
        const tier = a.tier || 'basic';
        const tierLbl = tier === 'premium' ? '🎯 Premium $50' : tier === 'featured' ? '⭐ Featured $30' : '📢 Basic $25';
        const status = a.status || 'pending';
        const statusColor = status === 'active' ? 'var(--green-dk)' : status === 'pending' ? 'var(--amber-dk)' : 'var(--text3)';
        const url = a.url ? (a.url.startsWith('http') ? a.url : 'https://' + a.url) : '';
        html += `<div style="padding:12px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:14px">${esc(a.name)}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:2px">${tierLbl} · <span style="color:${statusColor};font-weight:700">${esc(status.toUpperCase())}</span> · ${a.statewide_state?'STATE: '+esc(a.statewide_state):'zip '+esc(a.zipcode||'')}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:6px">${esc(a.email||'')} ${a.phone?'· '+esc(a.phone):''} ${url?'· <a href="'+esc(url)+'" target="_blank" style="color:var(--indigo)">website ↗</a>':''}</div>
            </div>
            <div style="display:flex;gap:4px">
              <button onclick="editAd(${a.id})" class="tile-btn" style="font-size:11px">Edit</button>
              <button onclick="deleteAd(${a.id},'${esc(a.name).replace(/'/g,"&#39;")}')" class="tile-btn" style="font-size:11px;background:var(--red-lt);color:var(--red-dk);border-color:var(--red)">Delete</button>
            </div>
          </div>
        </div>`;
      });
      html += '</div>';
    }
    html += '<div class="modal-actions"><button class="btn-amber" onclick="closeAdminModal(\'manageAdsModal\');openManualAdvertiser()">+ Add Business Ad</button><button class="btn-ghost" onclick="closeAdminModal(\'manageAdsModal\')">Close</button></div>';
    document.getElementById('manageAdsContent').innerHTML = html;
  } catch(e) { document.getElementById('manageAdsContent').innerHTML = '<p>' + esc(e.message) + '</p>'; }
}
async function editAd(id) {
  try {
    const a = await api('/api/admin/advertisers/' + id);
    document.getElementById('manualAdContent').innerHTML = renderAdForm('Edit Business Ad', a, true);
    closeAdminModal('manageAdsModal');
    openAdminModal('manualAdModal');
  } catch(e) { alert(e.message); }
}
async function deleteAd(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  try {
    await api('/api/admin/advertisers/' + id, { method:'DELETE' });
    adminToast('✓ Deleted');
    openManageAdsModal(); loadDashboard();
  } catch(e) { alert(e.message); }
}

function openManualAdvertiser() {
  document.getElementById('manualAdContent').innerHTML = renderAdForm('Add Business Ad', null, false);
  openAdminModal('manualAdModal');
}
function renderAdForm(title, existing, isEdit) {
  const a = existing || {};
  return `<div class="modal-title">${title}</div>
    <div style="font-size:12.5px;color:var(--text2);margin-bottom:14px">Manually add a paid advertiser (e.g., for customers who paid by cash/check or were comped).</div>
    <div class="field"><label>Tier</label>
      <select id="adTier" style="width:100%;padding:9px;border:1.5px solid var(--border-md);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font-body)">
        <option value="basic"${a.tier==='basic'?' selected':''}>📢 Basic $25/mo — Sponsor Bar</option>
        <option value="featured"${a.tier==='featured'?' selected':''}>⭐ Featured $30/mo — Directory</option>
        <option value="premium"${a.tier==='premium'?' selected':''}>🎯 Premium $50/mo — Event Popup</option>
      </select>
    </div>
    <div class="field"><label>Business Name <span style="color:var(--red)">*</span></label><input id="adName" value="${esc(a.name||'')}" style="width:100%;padding:9px;border:1.5px solid var(--border-md);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font-body)"></div>
    <div class="field"><label>Email <span style="color:var(--red)">*</span></label><input id="adEmail" type="email" value="${esc(a.email||'')}" style="width:100%;padding:9px;border:1.5px solid var(--border-md);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font-body)"></div>
    <div class="field"><label>Phone</label><input id="adPhone" value="${esc(a.phone||'')}" placeholder="(555) 555-5555" style="width:100%;padding:9px;border:1.5px solid var(--border-md);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font-body)"></div>
    <div class="field"><label>Website</label><input id="adUrl" value="${esc(a.url||'')}" placeholder="example.com" style="width:100%;padding:9px;border:1.5px solid var(--border-md);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font-body)"></div>
    <div class="field"><label>Address (optional)</label><input id="adAddress" value="${esc(a.address||'')}" style="width:100%;padding:9px;border:1.5px solid var(--border-md);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font-body)"></div>
    <div class="field"><label>Description / Tagline</label><textarea id="adDesc" rows="3" style="width:100%;padding:9px;border:1.5px solid var(--border-md);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font-body);resize:vertical">${esc(a.description||a.tagline||'')}</textarea></div>
    <div class="field"><label>Target Zipcode <span style="color:var(--red)">*</span> <span style="font-size:11px;color:var(--text3);font-weight:400">— or use state-wide below</span></label><input id="adZip" value="${esc(a.zipcode||'')}" maxlength="5" placeholder="43764" style="width:100%;padding:9px;border:1.5px solid var(--border-md);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font-body)"></div>
    <div class="field"><label>State-Wide (2-letter code, e.g. OH) — overrides zipcode</label><input id="adState" value="${esc(a.statewide_state||'')}" maxlength="2" style="width:100%;padding:9px;border:1.5px solid var(--border-md);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font-body)"></div>

        <option value="active"${a.status==='active'||!a.status?' selected':''}>Active</option>
        <option value="pending"${a.status==='pending'?' selected':''}>Pending</option>

      <button class="btn-ghost" onclick="closeAdminModal('manualAdModal')">Cancel</button>

async function saveManualAd(id) {
  const errEl = document.getElementById('adErr'); errEl.textContent = '';
  const payload = {
    tier: document.getElementById('adTier').value,
    name: document.getElementById('adName').value.trim(),
    email: document.getElementById('adEmail').value.trim(),
    phone: document.getElementById('adPhone').value.trim(),
    url: document.getElementById('adUrl').value.trim(),
    address: document.getElementById('adAddress').value.trim(),
    description: document.getElementById('adDesc').value.trim(),
    zipcode: document.getElementById('adZip').value.trim(),
    statewide_state: document.getElementById('adState').value.trim().toUpperCase(),
    status: document.getElementById('adStatus').value,
  };
  if (!payload.name || !payload.email) { errEl.textContent = 'Business name and email are required.'; return; }
  if (!payload.zipcode && !payload.statewide_state) { errEl.textContent = 'Either zipcode or state-wide state is required.'; return; }
  try {
    if (id) await api('/api/admin/advertisers/' + id, { method:'PUT', body: JSON.stringify(payload) });
    else    await api('/api/admin/advertisers/manual', { method:'POST', body: JSON.stringify(payload) });
    adminToast('✓ Saved');
    closeAdminModal('manualAdModal');
    openManageAdsModal(); loadDashboard();
  } catch(e) { errEl.textContent = e.message; }
}

function openBulkRemove() {
  document.getElementById('bulkRemoveContent').innerHTML = `
    <div class="modal-title">👤 Bulk Remove by User</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px">Find a user by email and remove all events + listings they posted. Useful when spam slips through.</p>
    <div class="field"><label>User Email</label><input id="brEmail" type="email" placeholder="user@example.com" style="width:100%;padding:9px;border:1.5px solid var(--border-md);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font-body)"></div>
    <button onclick="loadUserItems()" class="btn-amber" style="width:100%">Find User's Posts →</button>
    <div id="brResults" style="margin-top:14px"></div>
    <div class="modal-actions"><button class="btn-ghost" onclick="closeAdminModal('bulkRemoveModal')">Close</button></div>`;
  openAdminModal('bulkRemoveModal');
}
async function loadUserItems() {
  const email = document.getElementById('brEmail').value.trim();
  if (!email) return;
  try {
    const data = await api('/api/admin/user-items?email=' + encodeURIComponent(email));
    let html = `<div style="padding:12px;background:var(--surface2);border-radius:8px;font-size:13px"><strong>${esc(data.user?.name||'Unknown user')}</strong> · ${esc(data.user?.email||email)}<br><span style="color:var(--text3);font-size:12px">${data.events.length} event(s), ${data.listings.length} listing(s)</span></div>`;
    if (data.events.length || data.listings.length) {
      html += `<button onclick="bulkRemoveByUser('${esc(email)}')" class="btn-amber" style="width:100%;margin-top:10px;background:var(--red);color:#fff">🗑 Remove ALL of this user's posts</button>`;
    }
    document.getElementById('brResults').innerHTML = html;
  } catch(e) { document.getElementById('brResults').innerHTML = '<p style="color:var(--red);font-size:13px">' + esc(e.message) + '</p>'; }
}
async function bulkRemoveByUser(email) {
  const reason = prompt('Reason for bulk removal (for the audit log):', 'Spam');
  if (reason === null) return;
  if (!confirm(`Permanently remove ALL events + listings from ${email}? This cannot be undone.`)) return;
  try {
    const r = await api('/api/admin/bulk-remove-by-user', { method:'POST', body: JSON.stringify({ email, reason })});
    adminToast(`✓ Removed ${r.events_removed} event(s) + ${r.listings_removed} listing(s)`);
    closeAdminModal('bulkRemoveModal');
    loadDashboard();
  } catch(e) { alert(e.message); }
}

// PRE-LAUNCH CHECKLIST WIDGET
// ────────────────────────────────────────────────────────────
async function loadLaunchChecklist() {
  try {
    const data = await api('/api/admin/launch-checklist');
    renderLaunchChecklist(data);
  } catch(e) { console.error('Launch checklist load:', e); }
}

function renderLaunchChecklist(data) {
  const { items, counts, launchReady } = data;
  const incompleteCount = counts.critical + counts.warning;
  const bannerClass = launchReady ? 'ready' : counts.critical > 0 ? 'critical' : 'warning';
  const titleIcon = launchReady ? '🚀' : counts.critical > 0 ? '⚠️' : '🛠️';
  const titleText = launchReady ? 'Ready to Launch!' : 'Pre-Launch Checklist';
  let summary;
  if (launchReady) summary = `All ${counts.total} items complete. You're ready to announce the site to your community.`;
  else if (counts.critical > 0) summary = `${counts.critical} critical item${counts.critical>1?'s':''} blocking launch · ${counts.warning} other warning${counts.warning!==1?'s':''} · ${counts.ok}/${counts.total} complete`;
  else summary = `${counts.warning} item${counts.warning>1?'s':''} need attention · ${counts.ok}/${counts.total} complete`;

  // Group items by tier
  const tierOrder = ['critical', 'stripe', 'content', 'optional'];
  const tierLabels = {
    critical: 'Critical Infrastructure (must be done)',
    stripe:   'Stripe Tier Pricing',
    content:  'Content Seeding',
    optional: 'Optional / Nice-to-have'
  };

  const itemsByTier = {};
  items.forEach(it => { (itemsByTier[it.tier] = itemsByTier[it.tier] || []).push(it); });

  let itemsHtml = '';
  tierOrder.forEach(tier => {
    if (!itemsByTier[tier]) return;
    itemsHtml += `<div class="launch-tier-divider">${tierLabels[tier]}</div>`;
    itemsByTier[tier].forEach(it => {
      const icon = it.status === 'ok' ? '✅' : it.status === 'critical' ? '🔴' : it.status === 'warning' ? '🟡' : 'ℹ️';
      itemsHtml += `<div class="launch-item ${it.status}">
        <div class="launch-item-icon">${icon}</div>
        <div class="launch-item-body">
          <div class="launch-item-label">${esc(it.label)}</div>
          ${it.meta ? `<div class="launch-item-meta">${esc(it.meta)}</div>` : ''}
          ${it.status !== 'ok' ? `<div class="launch-item-help">${esc(it.help||'')}</div>` : ''}
        </div>
      </div>`;
    });
  });

  document.getElementById('launchChecklist').innerHTML = `
    <div class="launch-banner ${bannerClass}">
      <div class="launch-banner-head" onclick="toggleLaunchItems()">
        <div>
          <div class="launch-banner-title">${titleIcon} ${titleText}</div>
          <div class="launch-banner-summary">${summary}</div>
        </div>
        <button class="launch-banner-toggle" id="lcToggleBtn">${incompleteCount > 0 ? 'Show details ↓' : 'Show ↓'}</button>
      </div>
      <div class="launch-items ${incompleteCount > 0 ? 'open' : ''}" id="launchItems">
        ${itemsHtml}
        ${launchReady ? '<div style="text-align:center;padding:14px;color:var(--green-dk);font-weight:700;font-size:14px;background:var(--green-lt);border-radius:8px;margin-top:14px">🎉 You\'ve completed every pre-launch task. Time to announce!</div>' : ''}
      </div>
    </div>`;
  // If incomplete items exist, auto-expand. If all complete, default collapsed.
  if (incompleteCount > 0) document.getElementById('lcToggleBtn').textContent = 'Hide details ↑';
}

function toggleLaunchItems() {
  const items = document.getElementById('launchItems');
  const btn = document.getElementById('lcToggleBtn');
  if (items.classList.contains('open')) {
    items.classList.remove('open');
    btn.textContent = 'Show details ↓';
  } else {
    items.classList.add('open');
    btn.textContent = 'Hide details ↑';
  }
}

// Boot
if (!TOKEN) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('accessDenied').style.display = 'block';
} else {
  loadDashboard();
}
</script>
